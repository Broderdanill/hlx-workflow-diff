apiVersion: v1
kind: ConfigMap
metadata:
  name: hlx-workflow-diff-config
data:
  config.yaml: |
    environments:
      - name: um
        base_url: http://ars-arserver:8008
        username: Demo
        password: P@ssw0rd
        verify_tls: false
      - name: utb
        base_url: http://ars-arserver:8008
        username: Demo
        password: P@ssw0rd
        verify_tls: false

    # Object types, fält och relaterade metadata-former ligger som default i appen.
    # Vill du override:a dem kan du lägga till object_types här, men låt annars bli så att
    # den djupa jämförelsen använder standardstödet för actions, mappings, guide references, fält och menyer.

    # Begränsa vilka formulär som ska cacheas och vilka workflow-objekt som räknas som relevanta.
    # Workflow filtreras via mapping till inkluderade formulär, t.ex. actlink_mapping/filter_mapping/escal_mapping.
    # Mönster utan wildcard tolkas som prefix. Exempel: HLX betyder samma som HLX*.
    # När cache_scope är aktivt används strikt formulärscope som standard:
    # Forms + Active Links + Filters + Escalations + relevanta Guides cacheas.
    # Globala objekt som Menus, Applications, Packing Lists och Web Services hoppas över
    # om du inte explicit sätter HELIX_SCOPE_INCLUDE_GLOBAL_TYPES=true.
    cache_scope:
      include_form_prefixes: [HLX*,AR*]
      exclude_form_prefixes: []
      # Exempel:
      # include_form_prefixes:
      #   - HLX*
      # exclude_form_prefixes:
      #   - HLX:Temp*
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hlx-workflow-diff-cache-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: hlx-workflow-diff
spec:
  volumes:
    - name: cache-volume
      persistentVolumeClaim:
        claimName: hlx-workflow-diff-cache-pvc
    - name: config-volume
      configMap:
        name: hlx-workflow-diff-config
  containers:
    - name: app
      image: localhost/hlx-workflow-diff:latest
      ports:
        - containerPort: 8089
          hostPort: 8089
      env:
        - name: HELIX_CONFIG_PATH
          value: /etc/hlx-workflow-diff/config.yaml
        - name: HELIX_CACHE_DIR
          value: /data/cache
        - name: HELIX_SYNC_ON_START
          value: "true"
        - name: HELIX_DEEP_PROFILE
          value: balanced
        - name: HELIX_ENV_CONCURRENCY
          value: "1"
        - name: HELIX_OBJECT_CONCURRENCY
          value: "1"
        - name: HELIX_RELATED_FETCH_CONCURRENCY
          value: "3"
        - name: HELIX_RELATED_BATCH_CONCURRENCY
          value: "3"
        - name: HELIX_RELATED_PARENT_BATCH_SIZE
          value: "25"
        - name: HELIX_HTTP_TIMEOUT
          value: "300"
        - name: LOG_LEVEL
          value: INFO
      volumeMounts:
        - name: cache-volume
          mountPath: /data/cache
        - name: config-volume
          mountPath: /etc/hlx-workflow-diff
          readOnly: true
