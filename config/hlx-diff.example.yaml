# Sorteringsordningen följer den ordning AR-utvecklare normalt ser i Developer Studio:
# Forms, Active Links, Filters, Escalations, Guides, Applications, Packing Lists, Web Services, Menus.
# Guides/Applications/Packing Lists/Web Services ligger i AR System Metadata: arcontainer och delas via containerType.
# Standardvärden som används här: Active Link Guide=1, Application=2, Packing List=3, Filter Guide=4, Web Service=5.
object_types:
  - key: form
    label: Forms
    form: "AR System Metadata: arschema"
    name_field: name
    compare_fields: [numFields, schemaType, numVuis, coreVersion, defaultVui, nextFieldId, safeGuard, viewName, objProp, smObjProp, version, overlayGroup, overlayProp, resolvedName, schemaRowIdentifier, bundleScope, bundleScopeEnabled]
    search_fields: [name, resolvedName, viewName]
  - key: actlink
    label: Active Links
    form: "AR System Metadata: actlink"
    name_field: name
    compare_fields: [enable, numActions, numElses, queryShort, queryLong, objProp, smObjProp, version, alOrder, controlfieldId, errorActlinkId, errorActlinkOptions, executeMask, safeGuard, wkConnType, overlayGroup, overlayProp, resolvedName, bundleScope, bundleScopeEnabled]
    search_fields: [name, queryShort, queryLong, resolvedName]
  - key: filter
    label: Filters
    form: "AR System Metadata: filter"
    name_field: name
    compare_fields: [enable, numActions, numElses, queryShort, queryLong, objProp, smObjProp, version, errorFilterId, errorFilterOptions, fOrder, opSet, safeGuard, wkConnType, overlayGroup, overlayProp, resolvedName, bundleScope, bundleScopeEnabled]
    search_fields: [name, queryShort, queryLong, resolvedName]
  - key: escalation
    label: Escalations
    form: "AR System Metadata: escalation"
    name_field: name
    compare_fields: [enable, numActions, numElses, queryShort, queryLong, objProp, smObjProp, version, firetmType, hourmask, minute, monthday, safeGuard, tminterval, weekday, wkConnType, overlayGroup, overlayProp, resolvedName, bundleScope, bundleScopeEnabled]
    search_fields: [name, queryShort, queryLong, resolvedName]
  - key: active_link_guide
    label: Active Link Guides
    form: "AR System Metadata: arcontainer"
    name_field: name
    type_field: containerType
    type_values: [1]
    compare_fields: [containerType, label, description, numReferences, safeGuard, objProp, smObjProp, version, overlayGroup, overlayProp, resolvedName, bundleScope, bundleScopeEnabled]
    search_fields: [name, label, description, resolvedName]
  - key: filter_guide
    label: Filter Guides
    form: "AR System Metadata: arcontainer"
    name_field: name
    type_field: containerType
    type_values: [4]
    compare_fields: [containerType, label, description, numReferences, safeGuard, objProp, smObjProp, version, overlayGroup, overlayProp, resolvedName, bundleScope, bundleScopeEnabled]
    search_fields: [name, label, description, resolvedName]
  - key: application
    label: Applications
    form: "AR System Metadata: arcontainer"
    name_field: name
    type_field: containerType
    type_values: [2]
    compare_fields: [containerType, label, description, numReferences, safeGuard, objProp, smObjProp, version, overlayGroup, overlayProp, resolvedName, bundleScope, bundleScopeEnabled]
    search_fields: [name, label, description, resolvedName]
  - key: packing_list
    label: Packing Lists
    form: "AR System Metadata: arcontainer"
    name_field: name
    type_field: containerType
    type_values: [3]
    compare_fields: [containerType, label, description, numReferences, safeGuard, objProp, smObjProp, version, overlayGroup, overlayProp, resolvedName, bundleScope, bundleScopeEnabled]
    search_fields: [name, label, description, resolvedName]
  - key: web_service
    label: Web Services
    form: "AR System Metadata: arcontainer"
    name_field: name
    type_field: containerType
    type_values: [5]
    compare_fields: [containerType, label, description, numReferences, safeGuard, objProp, smObjProp, version, overlayGroup, overlayProp, resolvedName, bundleScope, bundleScopeEnabled]
    search_fields: [name, label, description, resolvedName]
  - key: menu
    label: Menus
    form: "AR System Metadata: char_menu"
    name_field: name
    compare_fields: [menuType, refreshCode, safeGuard, objProp, smObjProp, version, overlayGroup, overlayProp, resolvedName, bundleScope, bundleScopeEnabled]
    search_fields: [name, resolvedName]
